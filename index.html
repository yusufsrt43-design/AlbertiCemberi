<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alberti Çemberi - Liquid Glass</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a; /* Koyu slate arka plan */
            color: #e2e8f0;
            overflow-x: hidden;
        }

        /* --- SIVI CAM (LIQUID GLASS) OPTİMİZASYONLARI --- */
        
        /* Sabit Paneller İçin Gerçek Blur (Telefonda sorun yaratmaz) */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }
        
        .glass-input:focus {
            background: rgba(0, 0, 0, 0.3);
            border-color: rgba(34, 211, 238, 0.5); /* Cyan glow */
            outline: none;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.2), inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* Dış Çember (Sabit - Blur kullanılabilir) */
        .outer-disk {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                inset 0 0 20px rgba(255, 255, 255, 0.05),
                0 15px 35px rgba(0, 0, 0, 0.5);
        }

        /* İç Çember (Dönen - OPTİMİZASYON: Blur YOK, transparan gradient var) */
        .inner-disk {
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 
                inset 0 2px 15px rgba(255,255,255,0.1),
                0 4px 15px rgba(0, 0, 0, 0.4);
            will-change: transform; /* GPU İvmelendirmesi */
            transform: translateZ(0); /* Donanımsal render */
        }

        /* Çemberlerin pürüzsüz dönmesi için animasyon */
        #inner-circle {
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            will-change: transform;
        }
        
        /* Harflerin daire etrafındaki konumlandırmaları */
        .letter-wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 24px;
            height: 24px;
            margin-left: -12px;
            margin-top: -12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-mono { font-family: 'Space Mono', monospace; }

        /* Sürükleme özellikleri */
        .draggable {
            cursor: grab;
            touch-action: none;
        }
        .draggable:active {
            cursor: grabbing;
        }

        /* Arka Plan Sıvı Animasyonları (Sadece Opacity değişir, cihazı yormaz) */
        @keyframes pulse-slow {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.7; }
        }
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            pointer-events: none;
            animation: pulse-slow 8s ease-in-out infinite alternate;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-center relative">

    <!-- Sıvı Arka Plan Efektleri -->
    <div class="blob bg-cyan-600/40 w-[300px] h-[300px] top-[-50px] left-[-50px]"></div>
    <div class="blob bg-purple-600/40 w-[400px] h-[400px] bottom-[-100px] right-[-100px]" style="animation-delay: -4s;"></div>
    <div class="blob bg-blue-600/30 w-[200px] h-[200px] top-[40%] left-[30%]" style="animation-delay: -2s;"></div>

    <div class="max-w-md mx-auto p-4 w-full relative z-10">
        
        <!-- Ana Cam Panel -->
        <div class="glass-panel rounded-3xl p-5 sm:p-6">
            
            <!-- Başlık -->
            <h1 class="text-center text-xl font-semibold mb-6 tracking-wide text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-purple-300">
                Alberti Çemberi
            </h1>

            <!-- Çember (Disk) Bölümü -->
            <div class="relative w-[75vw] max-w-[280px] h-[75vw] max-h-[280px] mx-auto mb-8 rounded-full">
                
                <!-- Dış Çember (Sabit) -->
                <div id="outer-circle" class="absolute inset-0 rounded-full outer-disk text-slate-200">
                    <!-- İşaretçi (Neon Pointer) -->
                    <div class="absolute -top-1 left-1/2 -ml-[6px] w-0 h-0 border-l-[6px] border-r-[6px] border-t-[10px] border-transparent border-t-cyan-400 z-10 drop-shadow-[0_0_8px_rgba(34,211,238,0.8)]"></div>
                </div>

                <!-- İç Çember (Dönen ve Sürüklenebilen - Optimize Edilmiş) -->
                <div id="inner-circle-wrapper" class="absolute inset-[18%] rounded-full inner-disk text-cyan-300 z-0 draggable">
                    <div id="inner-circle" class="w-full h-full relative rounded-full"></div>
                </div>
                
                <!-- Çemberin Göbeği (Süsleme) -->
                <div class="absolute inset-[44%] rounded-full bg-white/10 backdrop-blur-sm border border-white/20 shadow-[inset_0_2px_4px_rgba(255,255,255,0.2),0_4px_8px_rgba(0,0,0,0.5)] flex items-center justify-center z-10 pointer-events-none">
                    <div class="w-2 h-2 bg-cyan-400 rounded-full shadow-[0_0_10px_rgba(34,211,238,0.8)]"></div>
                </div>
            </div>

            <!-- Kontrol Mekanizması ve Mod Seçici -->
            <div class="mb-6 flex flex-col items-center">
                
                <!-- Yön Butonları (Eski Switch'in Yeri - Varsayılan olarak gizli) -->
                <div id="button-controls" class="hidden flex items-center justify-center gap-6 mb-4 w-full">
                    <button id="btn-left" class="bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/10 text-cyan-300 p-3 rounded-full transition-all touch-manipulation shadow-lg backdrop-blur-sm">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    </button>
                    <button id="btn-right" class="bg-white/5 hover:bg-white/10 active:bg-white/20 border border-white/10 text-cyan-300 p-3 rounded-full transition-all touch-manipulation shadow-lg backdrop-blur-sm">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    </button>
                </div>

                <!-- Kullanıcıya Bilgi Mesajı -->
                <p id="drag-instruction" class="text-cyan-200/60 text-[10px] mb-4 uppercase tracking-widest flex items-center justify-center gap-2 transition-opacity h-4 font-semibold">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                    Döndürmek için sürükleyin
                </p>

                <!-- Alt Kontrol Paneli: Aktif Anahtar ve Switch -->
                <div class="flex flex-row items-stretch justify-center gap-2 sm:gap-3 w-full">
                    
                    <!-- Aktif Anahtar -->
                    <div class="flex items-center bg-black/20 border border-white/10 rounded-xl px-4 py-2 shadow-inner min-w-[140px] justify-center flex-1">
                        <span class="text-white/50 text-[10px] sm:text-xs uppercase font-semibold mr-2">Anahtar:</span>
                        <span id="key-display" class="text-lg sm:text-xl font-bold text-cyan-400 font-mono tracking-widest drop-shadow-[0_0_5px_rgba(34,211,238,0.5)]">A=A</span>
                    </div>

                    <!-- Switch (Sürükle / Buton) -->
                    <div class="flex items-center justify-center gap-2 bg-black/20 border border-white/10 px-3 py-2 rounded-xl shadow-inner">
                        <svg id="icon-btn" class="w-4 h-4 text-white/30 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                        
                        <button id="mode-toggle" class="relative inline-flex h-5 w-9 items-center rounded-full bg-cyan-500/80 transition-colors focus:outline-none shadow-inner mx-1 border border-white/20">
                            <span id="mode-toggle-thumb" class="inline-block h-3.5 w-3.5 translate-x-4 rounded-full bg-white transition-transform shadow transform"></span>
                        </button>
                        
                        <svg id="icon-drag" class="w-4 h-4 text-cyan-300 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"></path></svg>
                    </div>

                </div>
            </div>

            <!-- Mod Seçici (Şifrele/Çöz) -->
            <div class="flex bg-black/30 border border-white/5 rounded-xl p-1 mb-5 shadow-inner">
                <button id="mode-encrypt" class="flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg bg-white/10 text-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] border border-white/10 transition-all">Şifrele</button>
                <button id="mode-decrypt" class="flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg text-white/50 hover:text-white transition-all border border-transparent">Şifre Çöz</button>
            </div>

            <!-- Giriş Alanı -->
            <div class="mb-4">
                <label class="block text-[10px] text-cyan-200/60 uppercase mb-1.5 font-bold tracking-wider ml-1">Metin Girişi</label>
                <textarea id="input-text" rows="3" class="w-full glass-input rounded-xl p-3 text-white transition-all placeholder-white/30 resize-none font-mono text-sm" placeholder="Buraya yazın..."></textarea>
            </div>

            <!-- Çıkış Alanı -->
            <div class="relative mt-2">
                <label class="block text-[10px] text-cyan-200/60 uppercase mb-1.5 font-bold tracking-wider ml-1">Sonuç</label>
                <div id="output-text" class="w-full min-h-[4rem] bg-black/40 border border-white/5 rounded-xl p-3 pb-8 text-cyan-300 font-mono text-sm break-words flex items-start shadow-inner"></div>
                
                <div class="absolute right-2 bottom-2 flex items-center gap-2">
                    <span id="copy-toast" class="text-cyan-300 text-[10px] font-bold tracking-wider uppercase opacity-0 transition-opacity pointer-events-none drop-shadow-md">Kopyalandı!</span>
                    <button id="btn-copy" class="text-white/50 hover:text-cyan-300 bg-white/5 hover:bg-white/10 border border-white/10 p-1.5 rounded-lg transition-all" title="Kopyala">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script>
        // Türkçe 29 Harfli Alfabeler
        const outerAlphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        const innerAlphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        const totalChars = outerAlphabet.length;
        
        let currentOffset = 0;
        let isEncryptMode = true;
        let isDragMode = true;

        // DOM Elementleri
        const outerCircle = document.getElementById('outer-circle');
        const innerWrapper = document.getElementById('inner-circle-wrapper');
        const innerCircle = document.getElementById('inner-circle');
        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');
        const modeEncrypt = document.getElementById('mode-encrypt');
        const modeDecrypt = document.getElementById('mode-decrypt');
        const btnCopy = document.getElementById('btn-copy');
        const copyToast = document.getElementById('copy-toast');
        const keyDisplay = document.getElementById('key-display');
        
        const modeToggleBtn = document.getElementById('mode-toggle');
        const modeToggleThumb = document.getElementById('mode-toggle-thumb');
        const iconBtn = document.getElementById('icon-btn');
        const iconDrag = document.getElementById('icon-drag');
        const buttonControls = document.getElementById('button-controls');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const dragInstruction = document.getElementById('drag-instruction');

        // Çemberleri Çizme Fonksiyonu
        function drawLetters(container, alphabet, radiusPercent, isInner) {
            const chars = alphabet.split('');
            const angleStep = 360 / totalChars;

            chars.forEach((char, index) => {
                const letterWrap = document.createElement('div');
                letterWrap.className = 'letter-wrap';
                
                const angleDeg = index * angleStep;
                const angleRad = (angleDeg - 90) * (Math.PI / 180); 
                
                const x = Math.cos(angleRad) * radiusPercent;
                const y = Math.sin(angleRad) * radiusPercent;

                letterWrap.style.left = `calc(50% + ${x}%)`;
                letterWrap.style.top = `calc(50% + ${y}%)`;
                letterWrap.style.transform = `rotate(${angleDeg}deg)`;

                const letterSpan = document.createElement('span');
                letterSpan.innerText = char;
                // İç ve dış harf boyutları - mobil uyumlu
                letterSpan.className = `font-bold font-mono ${isInner ? 'text-[9px] sm:text-[10px]' : 'text-[11px] sm:text-xs'}`;
                
                letterWrap.appendChild(letterSpan);
                container.appendChild(letterWrap);
            });
        }

        drawLetters(outerCircle, outerAlphabet, 42, false);
        drawLetters(innerCircle, innerAlphabet, 36, true);

        // --- KONTROL MODU DEĞİŞTİRME ---
        modeToggleBtn.addEventListener('click', () => {
            isDragMode = !isDragMode;
            
            if (isDragMode) {
                modeToggleBtn.classList.replace('bg-white/20', 'bg-cyan-500/80');
                modeToggleThumb.classList.replace('translate-x-1', 'translate-x-4');
                iconDrag.classList.replace('text-white/30', 'text-cyan-300');
                iconBtn.classList.replace('text-cyan-300', 'text-white/30');
                
                buttonControls.classList.add('hidden');
                dragInstruction.style.opacity = '1';
                innerWrapper.classList.add('draggable');
            } else {
                modeToggleBtn.classList.replace('bg-cyan-500/80', 'bg-white/20');
                modeToggleThumb.classList.replace('translate-x-4', 'translate-x-1');
                iconDrag.classList.replace('text-cyan-300', 'text-white/30');
                iconBtn.classList.replace('text-white/30', 'text-cyan-300');
                
                buttonControls.classList.remove('hidden');
                dragInstruction.style.opacity = '0';
                innerWrapper.classList.remove('draggable');
            }
        });

        // --- BUTONLA DÖNDÜRME ---
        btnRight.addEventListener('click', () => {
            if (isDragMode) return;
            currentOffset = (currentOffset + 1) % totalChars;
            updateRotationWithAnimation();
        });

        btnLeft.addEventListener('click', () => {
            if (isDragMode) return;
            currentOffset = (currentOffset - 1 + totalChars) % totalChars;
            updateRotationWithAnimation();
        });

        function updateRotationWithAnimation() {
            innerCircle.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            const angle = currentOffset * (360 / totalChars);
            innerCircle.style.transform = `rotate(${angle}deg)`;
            processText();
        }

        // --- SÜRÜKLE (DÖNDÜR) MEKANİZMASI ---
        let isDragging = false;
        let startAngle = 0;
        let startOffset = 0;
        let center = { x: 0, y: 0 };
        const angleStep = 360 / totalChars;

        function getCenter(el) {
            const rect = el.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
        }

        function getAngle(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return Math.atan2(clientY - center.y, clientX - center.x) * (180 / Math.PI);
        }

        function onDragStart(e) {
            if (!isDragMode) return;
            if (e.type === 'touchstart') e.preventDefault();
            
            isDragging = true;
            innerCircle.style.transition = 'none';
            center = getCenter(innerWrapper);
            startAngle = getAngle(e);
            startOffset = currentOffset;
        }

        function onDragMove(e) {
            if (!isDragging || !isDragMode) return;
            if (e.type === 'touchmove') e.preventDefault();
            
            const currentAngle = getAngle(e);
            const deltaAngle = currentAngle - startAngle;
            
            const exactRotation = (startOffset * angleStep) + deltaAngle;
            innerCircle.style.transform = `rotate(${exactRotation}deg)`;
            
            currentOffset = Math.round(exactRotation / angleStep);
            currentOffset = ((currentOffset % totalChars) + totalChars) % totalChars;
            
            processText();
        }

        function onDragEnd(e) {
            if (!isDragging || !isDragMode) return;
            isDragging = false;
            innerCircle.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            updateRotationWithAnimation();
        }

        innerWrapper.addEventListener('mousedown', onDragStart);
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);

        innerWrapper.addEventListener('touchstart', onDragStart, { passive: false });
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('touchend', onDragEnd);

        // --- METİN İŞLEME ---
        function processText() {
            const text = inputText.value.toLocaleUpperCase('tr-TR');
            let result = '';

            const innerIndexForA = (0 - currentOffset + totalChars) % totalChars;
            keyDisplay.innerText = `A=${innerAlphabet[innerIndexForA]}`;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                
                if (isEncryptMode) {
                    const outerIndex = outerAlphabet.indexOf(char);
                    if (outerIndex !== -1) {
                        const innerIndex = (outerIndex - currentOffset + totalChars) % totalChars;
                        result += innerAlphabet[innerIndex];
                    } else {
                        result += char; 
                    }
                } else {
                    const innerIndex = innerAlphabet.indexOf(char);
                    if (innerIndex !== -1) {
                        const outerIndex = (innerIndex + currentOffset) % totalChars;
                        result += outerAlphabet[outerIndex];
                    } else {
                        result += char;
                    }
                }
            }
            
            if (result === '') {
                outputText.innerHTML = '<span class="text-white/30 italic">Şifrelenmiş metin...</span>';
            } else {
                outputText.innerText = result;
            }
        }

        inputText.addEventListener('input', processText);

        modeEncrypt.addEventListener('click', () => {
            isEncryptMode = true;
            modeEncrypt.className = "flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg bg-white/10 text-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] border border-white/10 transition-all";
            modeDecrypt.className = "flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg text-white/50 hover:text-white transition-all border border-transparent";
            processText();
        });

        modeDecrypt.addEventListener('click', () => {
            isEncryptMode = false;
            modeDecrypt.className = "flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg bg-white/10 text-white shadow-[0_2px_8px_rgba(0,0,0,0.2)] border border-white/10 transition-all";
            modeEncrypt.className = "flex-1 py-2 text-xs sm:text-sm font-semibold rounded-lg text-white/50 hover:text-white transition-all border border-transparent";
            processText();
        });

        // Kopyalama
        btnCopy.addEventListener('click', () => {
            if (outputText.innerText && outputText.innerText !== 'Şifrelenmiş metin...') {
                const textToCopy = outputText.innerText;
                
                // Fallback kopyalama yöntemi (mobil browserlar için)
                const copyFallback = () => {
                    const textarea = document.createElement('textarea');
                    textarea.value = textToCopy;
                    document.body.appendChild(textarea);
                    textarea.select();
                    try { document.execCommand('copy'); } catch(e) {}
                    document.body.removeChild(textarea);
                    showToast();
                };

                const showToast = () => {
                    copyToast.style.opacity = '1';
                    setTimeout(() => { copyToast.style.opacity = '0'; }, 2000);
                };

                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(textToCopy).then(showToast).catch(copyFallback);
                } else {
                    copyFallback();
                }
            }
        });

        processText();

    </script>
</body>
</html>
