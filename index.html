<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alberti Çemberi Simülasyonu</title>
    <!-- Tailwind CSS (Tasarım ve mobil uyumluluk için) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Çemberlerin pürüzsüz dönmesi için animasyon */
        #inner-circle {
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Harflerin daire etrafındaki konumlandırmaları */
        .letter-wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 24px;
            height: 24px;
            margin-left: -12px;
            margin-top: -12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Çemberin arka plan dokusu */
        .disk-texture {
            background-image: radial-gradient(circle, #e2e8f0 0%, #cbd5e1 100%);
            box-shadow: inset 0 4px 6px -1px rgba(255, 255, 255, 0.5), 
                        inset 0 -4px 6px -1px rgba(0, 0, 0, 0.1),
                        0 10px 15px -3px rgba(0, 0, 0, 0.2);
        }
        .disk-texture-inner {
            background-image: radial-gradient(circle, #f8fafc 0%, #e2e8f0 100%);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 
                        inset 0 2px 4px 0 rgba(255, 255, 255, 0.5);
        }

        /* Sürükleme özellikleri */
        .draggable {
            cursor: grab;
            touch-action: none; /* Mobilde sürüklerken sayfanın kaymasını engeller */
        }
        .draggable:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans antialiased overflow-x-hidden flex flex-col justify-center">

    <div class="max-w-md mx-auto p-4 sm:p-6 w-full">
        
        <!-- Çember (Disk) Bölümü -->
        <div class="relative w-[85vw] max-w-[320px] h-[85vw] max-h-[320px] mx-auto mb-6 mt-6 rounded-full">
            
            <!-- Dış Çember (Sabit) -->
            <div id="outer-circle" class="absolute inset-0 rounded-full disk-texture text-slate-800 border-4 border-slate-700 shadow-xl">
                <!-- İşaretçi (Index Pointer) -->
                <div class="absolute top-0 left-1/2 -ml-2 -mt-3 w-0 h-0 border-l-[8px] border-r-[8px] border-t-[12px] border-transparent border-t-red-600 z-10 drop-shadow-md"></div>
            </div>

            <!-- İç Çember (Dönen ve Sürüklenebilen) -->
            <div id="inner-circle-wrapper" class="absolute inset-[18%] rounded-full disk-texture-inner text-blue-900 border-2 border-slate-400 z-0 draggable shadow-md hover:shadow-lg transition-shadow">
                <div id="inner-circle" class="w-full h-full relative rounded-full"></div>
            </div>
            
            <!-- Çemberin Göbeği (Süsleme) -->
            <div class="absolute inset-[45%] rounded-full bg-slate-300 shadow-inner border border-slate-400 flex items-center justify-center z-10 pointer-events-none">
                <div class="w-3 h-3 bg-slate-500 rounded-full"></div>
            </div>
        </div>

        <!-- Kontrol Mekanizması ve Mod Seçici -->
        <div class="mb-6 flex flex-col items-center">
            
            <!-- Yön Butonları (Eski Switch'in Yeri - Varsayılan olarak gizli) -->
            <div id="button-controls" class="hidden flex items-center justify-center gap-8 mb-4 w-full">
                <button id="btn-left" class="bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white p-3 rounded-full transition-all touch-manipulation shadow-lg border border-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button id="btn-right" class="bg-slate-700 hover:bg-slate-600 active:bg-slate-500 text-white p-3 rounded-full transition-all touch-manipulation shadow-lg border border-slate-600">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <!-- Kullanıcıya Bilgi Mesajı -->
            <p id="drag-instruction" class="text-slate-400 text-xs mb-3 uppercase tracking-widest flex items-center justify-center gap-2 transition-opacity h-4">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5M7.188 2.239l.777 2.897M5.136 7.965l-2.898-.777M13.95 4.05l-2.122 2.122m-5.657 5.656l-2.12 2.122"></path></svg>
                Şifreyi Değiştirmek İçin İç Daireyi Döndürün
            </p>

            <!-- Alt Kontrol Paneli: Aktif Anahtar ve Switch -->
            <div class="flex flex-row items-stretch justify-center gap-2 sm:gap-3 w-full">
                
                <!-- Aktif Anahtar -->
                <div class="flex items-center bg-slate-800 border border-slate-600 rounded-lg px-3 py-2 shadow-lg min-w-[140px] justify-center flex-1">
                    <span class="text-slate-400 text-[10px] sm:text-xs uppercase font-semibold mr-2">Aktif Anahtar:</span>
                    <span id="key-display" class="text-lg sm:text-xl font-bold text-emerald-400 font-mono tracking-widest">A=A</span>
                </div>

                <!-- Switch (Sürükle / Buton) İkonlu -->
                <div class="flex items-center justify-center gap-2 bg-slate-800 border border-slate-600 px-3 py-2 rounded-lg shadow-lg">
                    <!-- Buton İkonu (Oklar) -->
                    <svg id="icon-btn" class="w-5 h-5 text-slate-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Buton Modu"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                    
                    <button id="mode-toggle" class="relative inline-flex h-6 w-11 items-center rounded-full bg-blue-600 transition-colors focus:outline-none shadow-inner mx-1" aria-label="Kontrol modunu değiştir">
                        <span id="mode-toggle-thumb" class="inline-block h-4 w-4 translate-x-6 rounded-full bg-white transition-transform shadow transform"></span>
                    </button>
                    
                    <!-- Sürükle İkonu (El/Tutma) -->
                    <svg id="icon-drag" class="w-5 h-5 text-white transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-label="Sürükle Modu"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 11.5V14m0-2.5v-6a1.5 1.5 0 113 0m-3 6a1.5 1.5 0 00-3 0v2a7.5 7.5 0 0015 0v-5a1.5 1.5 0 00-3 0m-6-3V11m0-5.5v-1a1.5 1.5 0 013 0v1m0 0V11m0-5.5a1.5 1.5 0 013 0v3m0 0V11"></path></svg>
                </div>

            </div>
        </div>

        <!-- Şifreleme/Çözme Paneli -->
        <div class="bg-slate-800 rounded-2xl p-4 shadow-xl border border-slate-700 relative z-20">
            
            <!-- Mod Seçici -->
            <div class="flex bg-slate-900 rounded-lg p-1 mb-4 shadow-inner">
                <button id="mode-encrypt" class="flex-1 py-2 text-sm font-medium rounded-md bg-blue-600 text-white shadow transition-all">Şifrele</button>
                <button id="mode-decrypt" class="flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition-all">Şifre Çöz</button>
            </div>

            <!-- Giriş Alanı -->
            <div class="mb-4">
                <label class="block text-xs text-slate-400 uppercase mb-1 font-semibold">Metin</label>
                <textarea id="input-text" rows="3" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition-all placeholder-slate-600 shadow-inner resize-none" placeholder="Buraya yazın..."></textarea>
            </div>

            <!-- Çıkış Alanı -->
            <div class="relative">
                <label class="block text-xs text-slate-400 uppercase mb-1 font-semibold">Sonuç</label>
                <div id="output-text" class="w-full min-h-[5rem] bg-slate-700 border border-slate-600 rounded-lg p-3 text-emerald-400 font-mono break-words flex items-center shadow-inner"></div>
                
                <button id="btn-copy" class="absolute right-2 bottom-2 text-slate-400 hover:text-white bg-slate-800 hover:bg-slate-600 p-1.5 rounded-md transition-colors" title="Kopyala">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                </button>
            </div>
            <!-- Kopyalandı Uyarı Mesajı -->
            <div id="copy-toast" class="text-emerald-400 text-xs text-right mt-1 opacity-0 transition-opacity pointer-events-none">Kopyalandı!</div>

        </div>
    </div>

    <script>
        // Türkçe 29 Harfli Alfabeler - İkisi de alfabetik olarak sıralandı
        const outerAlphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        const innerAlphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        const totalChars = outerAlphabet.length; // 29
        
        let currentOffset = 0; // 0 ile 28 arası dönüş miktarı
        let isEncryptMode = true;
        let isDragMode = true; // Sürükle / Buton modu durumu

        // DOM Elementleri
        const outerCircle = document.getElementById('outer-circle');
        const innerWrapper = document.getElementById('inner-circle-wrapper');
        const innerCircle = document.getElementById('inner-circle');
        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');
        const modeEncrypt = document.getElementById('mode-encrypt');
        const modeDecrypt = document.getElementById('mode-decrypt');
        const btnCopy = document.getElementById('btn-copy');
        const copyToast = document.getElementById('copy-toast');
        const keyDisplay = document.getElementById('key-display');
        
        // Yeni DOM Elementleri (Kontrol Modu İçin)
        const modeToggleBtn = document.getElementById('mode-toggle');
        const modeToggleThumb = document.getElementById('mode-toggle-thumb');
        const iconBtn = document.getElementById('icon-btn');
        const iconDrag = document.getElementById('icon-drag');
        const buttonControls = document.getElementById('button-controls');
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const dragInstruction = document.getElementById('drag-instruction');

        // Çemberleri Çizme Fonksiyonu
        function drawLetters(container, alphabet, radiusPercent, isInner) {
            const chars = alphabet.split('');
            const angleStep = 360 / totalChars;

            chars.forEach((char, index) => {
                const letterWrap = document.createElement('div');
                letterWrap.className = 'letter-wrap';
                
                // Harflerin dairesel koordinatlarını hesaplama (Trigonometri)
                const angleDeg = index * angleStep;
                // -90 derece ekleyerek A harfinin en tepeden (saat 12 yönünden) başlamasını sağlıyoruz
                const angleRad = (angleDeg - 90) * (Math.PI / 180); 
                
                const x = Math.cos(angleRad) * radiusPercent;
                const y = Math.sin(angleRad) * radiusPercent;

                letterWrap.style.left = `calc(50% + ${x}%)`;
                letterWrap.style.top = `calc(50% + ${y}%)`;
                // Harfleri merkeze doğru döndür
                letterWrap.style.transform = `rotate(${angleDeg}deg)`;

                const letterSpan = document.createElement('span');
                letterSpan.innerText = char;
                letterSpan.className = `font-bold font-mono ${isInner ? 'text-[10px] sm:text-[11px]' : 'text-xs sm:text-sm'}`;
                
                letterWrap.appendChild(letterSpan);
                container.appendChild(letterWrap);
            });
        }

        // Çemberleri oluştur
        drawLetters(outerCircle, outerAlphabet, 42, false);
        drawLetters(innerCircle, innerAlphabet, 37, true);

        // --- KONTROL MODU DEĞİŞTİRME (SÜRÜKLE / BUTON) ---
        modeToggleBtn.addEventListener('click', () => {
            isDragMode = !isDragMode;
            
            if (isDragMode) {
                // Sürükle Moduna Geçiş
                modeToggleBtn.classList.replace('bg-slate-600', 'bg-blue-600');
                modeToggleThumb.classList.replace('translate-x-1', 'translate-x-6');
                iconDrag.classList.replace('text-slate-400', 'text-white');
                iconBtn.classList.replace('text-white', 'text-slate-400');
                
                buttonControls.classList.add('hidden');
                dragInstruction.style.opacity = '1';
                
                innerWrapper.classList.add('draggable');
            } else {
                // Buton Moduna Geçiş
                modeToggleBtn.classList.replace('bg-blue-600', 'bg-slate-600');
                modeToggleThumb.classList.replace('translate-x-6', 'translate-x-1');
                iconDrag.classList.replace('text-white', 'text-slate-400');
                iconBtn.classList.replace('text-slate-400', 'text-white');
                
                buttonControls.classList.remove('hidden');
                dragInstruction.style.opacity = '0'; // Yer tutması için tamamen kaldırmak yerine görünmez yapıyoruz
                
                innerWrapper.classList.remove('draggable');
            }
        });

        // --- BUTONLA DÖNDÜRME MEKANİZMASI ---
        btnRight.addEventListener('click', () => {
            if (isDragMode) return;
            currentOffset = (currentOffset + 1) % totalChars;
            updateRotationWithAnimation();
        });

        btnLeft.addEventListener('click', () => {
            if (isDragMode) return;
            currentOffset = (currentOffset - 1 + totalChars) % totalChars;
            updateRotationWithAnimation();
        });

        function updateRotationWithAnimation() {
            innerCircle.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            const angle = currentOffset * (360 / totalChars);
            innerCircle.style.transform = `rotate(${angle}deg)`;
            processText();
        }

        // --- SÜRÜKLE (DÖNDÜR) MEKANİZMASI ---
        let isDragging = false;
        let startAngle = 0;
        let startOffset = 0;
        let center = { x: 0, y: 0 };
        const angleStep = 360 / totalChars;

        function getCenter(el) {
            const rect = el.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
        }

        function getAngle(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return Math.atan2(clientY - center.y, clientX - center.x) * (180 / Math.PI);
        }

        function onDragStart(e) {
            if (!isDragMode) return; // Buton modundaysa sürüklemeyi iptal et
            if (e.type === 'touchstart') e.preventDefault();
            
            isDragging = true;
            innerCircle.style.transition = 'none'; // Sürüklerken pürüzsüz dönmesi için
            center = getCenter(innerWrapper);
            startAngle = getAngle(e);
            startOffset = currentOffset;
        }

        function onDragMove(e) {
            if (!isDragging || !isDragMode) return;
            if (e.type === 'touchmove') e.preventDefault();
            
            const currentAngle = getAngle(e);
            const deltaAngle = currentAngle - startAngle;
            
            // Gerçek fiziksel dönüş açısı
            const exactRotation = (startOffset * angleStep) + deltaAngle;
            innerCircle.style.transform = `rotate(${exactRotation}deg)`;
            
            // Arka planda şifrelemeyi anlık güncellemek için mantıksal ofseti bul
            currentOffset = Math.round(exactRotation / angleStep);
            currentOffset = ((currentOffset % totalChars) + totalChars) % totalChars; // Negatif değerleri düzelt
            
            processText();
        }

        function onDragEnd(e) {
            if (!isDragging || !isDragMode) return;
            isDragging = false;
            innerCircle.style.transition = 'transform 0.3s cubic-bezier(0.4, 0, 0.2, 1)';
            updateRotationWithAnimation(); // En yakın harfe hizala (Snap)
        }

        // Sürükleme Event Listener'ları Ekle
        innerWrapper.addEventListener('mousedown', onDragStart);
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);

        innerWrapper.addEventListener('touchstart', onDragStart, { passive: false });
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('touchend', onDragEnd);

        // Metin İşleme (Şifreleme veya Çözme)
        function processText() {
            // Türkçe karakterleri koruyarak büyük harfe çevir
            const text = inputText.value.toLocaleUpperCase('tr-TR');
            let result = '';

            // 1. Anahtar Göstergesini Güncelle (Dış A harfinin İç Hangi Harfe Denk Geldiği)
            // A harfinin outerAlphabet'teki indisi 0'dır.
            const innerIndexForA = (0 - currentOffset + totalChars) % totalChars;
            keyDisplay.innerText = `A=${innerAlphabet[innerIndexForA]}`;

            // 2. Metni Şifrele/Çöz
            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                
                if (isEncryptMode) {
                    const outerIndex = outerAlphabet.indexOf(char);
                    if (outerIndex !== -1) {
                        const innerIndex = (outerIndex - currentOffset + totalChars) % totalChars;
                        result += innerAlphabet[innerIndex];
                    } else {
                        // Harf değilse (boşluk, nokta vs.) aynen bırak
                        result += char; 
                    }
                } else {
                    const innerIndex = innerAlphabet.indexOf(char);
                    if (innerIndex !== -1) {
                        const outerIndex = (innerIndex + currentOffset) % totalChars;
                        result += outerAlphabet[outerIndex];
                    } else {
                        result += char;
                    }
                }
            }
            
            // Eğer giriş boşsa yer tutucu bir metin göster
            if (result === '') {
                outputText.innerHTML = '<span class="text-slate-500 italic">Sonuç burada görünecek...</span>';
            } else {
                outputText.innerText = result;
            }
        }

        // --- DİĞER OLAY DİNLEYİCİLERİ ---

        // Metin yazıldıkça anlık çeviri yap
        inputText.addEventListener('input', processText);

        // Mod Değiştirme (Şifrele / Çöz)
        modeEncrypt.addEventListener('click', () => {
            isEncryptMode = true;
            modeEncrypt.className = "flex-1 py-2 text-sm font-medium rounded-md bg-blue-600 text-white shadow transition-all";
            modeDecrypt.className = "flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition-all";
            processText();
        });

        modeDecrypt.addEventListener('click', () => {
            isEncryptMode = false;
            modeDecrypt.className = "flex-1 py-2 text-sm font-medium rounded-md bg-purple-600 text-white shadow transition-all";
            modeEncrypt.className = "flex-1 py-2 text-sm font-medium rounded-md text-slate-400 hover:text-white transition-all";
            processText();
        });

        // Kopyalama Butonu
        btnCopy.addEventListener('click', () => {
            if (outputText.innerText && outputText.innerText !== 'Sonuç burada görünecek...') {
                navigator.clipboard.writeText(outputText.innerText).then(() => {
                    copyToast.style.opacity = '1';
                    setTimeout(() => { copyToast.style.opacity = '0'; }, 2000);
                }).catch(err => {
                    const textarea = document.createElement('textarea');
                    textarea.value = outputText.innerText;
                    document.body.appendChild(textarea);
                    textarea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textarea);
                    
                    copyToast.style.opacity = '1';
                    setTimeout(() => { copyToast.style.opacity = '0'; }, 2000);
                });
            }
        });

        // Başlangıç durumu
        processText();

    </script>
</body>
</html>
