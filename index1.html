<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <title>Alberti Çemberi - Po.E.T.A Edition</title>

    <link rel="icon" type="image/png" href="POETA_Logo.png">
    <link rel="apple-touch-icon" href="POETA_Logo.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #020617;
            color: #e2e8f0;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* --- SIVI CAM (LIQUID GLASS) EFEKTLERİ --- */
        .glass-panel {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(255, 255, 255, 0.05);
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
        
        .glass-input:focus {
            background: rgba(0, 0, 0, 0.5);
            border-color: rgba(34, 211, 238, 0.5);
            outline: none;
            box-shadow: 0 0 20px rgba(34, 211, 238, 0.2), inset 0 2px 10px rgba(0,0,0,0.5);
        }

        .outer-disk {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: inset 0 0 30px rgba(255, 255, 255, 0.05), 0 15px 35px rgba(0, 0, 0, 0.6);
        }

        .inner-disk {
            background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.02) 100%);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: inset 0 2px 15px rgba(255,255,255,0.1), 0 4px 15px rgba(0, 0, 0, 0.4);
            will-change: transform;
            transform: translateZ(0);
        }

        #inner-circle {
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .letter-wrap {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 30px;
            height: 30px;
            margin-left: -15px;
            margin-top: -15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .font-mono { font-family: 'Space Mono', monospace; }

        .draggable {
            cursor: grab;
            touch-action: none;
        }
        .draggable:active {
            cursor: grabbing;
        }

        @keyframes pulse-slow {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.1); }
        }
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            z-index: -1;
            pointer-events: none;
            animation: pulse-slow 12s ease-in-out infinite alternate;
        }

        /* Logo Parıltısı */
        .logo-glow {
            filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.4));
            transition: all 0.5s ease;
        }
        .group:hover .logo-glow {
            filter: drop-shadow(0 0 15px rgba(34, 211, 238, 0.8)) brightness(1.2);
        }

        /* PC için Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 sm:p-8 min-h-screen">

    <div class="blob bg-cyan-600/30 w-[400px] h-[400px] -top-20 -left-20"></div>
    <div class="blob bg-purple-600/30 w-[500px] h-[500px] -bottom-20 -right-20" style="animation-delay: -4s;"></div>
    <div class="blob bg-blue-600/20 w-[300px] h-[300px] top-1/2 left-1/4" style="animation-delay: -2s;"></div>

    <main class="w-full max-w-6xl mx-auto relative z-10 flex-grow flex flex-col items-center justify-center">
        <div class="glass-panel rounded-[2.5rem] p-6 sm:p-10 flex flex-col lg:flex-row gap-10 items-center w-full">
            
            <div class="w-full lg:w-1/2 flex flex-col items-center">
                <h1 class="text-center text-2xl lg:text-3xl font-bold mb-8 tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-300 to-purple-300 uppercase">
                    Alberti Çemberi
                </h1>

                <div class="relative w-[70vw] h-[70vw] max-w-[340px] max-h-[340px] lg:w-[400px] lg:h-[400px] lg:max-w-none lg:max-h-none mx-auto mb-10 rounded-full">
                    <div id="outer-circle" class="absolute inset-0 rounded-full outer-disk text-slate-200">
                        <div class="absolute -top-2 left-1/2 -ml-[8px] w-0 h-0 border-l-[8px] border-r-[8px] border-t-[12px] border-transparent border-t-cyan-400 z-10 drop-shadow-[0_0_10px_rgba(34,211,238,0.8)]"></div>
                    </div>
                    <div id="inner-circle-wrapper" class="absolute inset-[18%] rounded-full inner-disk text-cyan-300 z-0 draggable">
                        <div id="inner-circle" class="w-full h-full relative rounded-full"></div>
                    </div>
                    <div class="absolute inset-[43%] rounded-full bg-white/5 backdrop-blur-md border border-white/10 shadow-[inset_0_2px_4px_rgba(255,255,255,0.1),0_4px_12px_rgba(0,0,0,0.6)] flex items-center justify-center z-10 pointer-events-none">
                        <div class="w-3 h-3 bg-cyan-400 rounded-full shadow-[0_0_15px_rgba(34,211,238,1)]"></div>
                    </div>
                </div>

                <div class="flex flex-col items-center gap-4 w-full max-w-[340px]">
                    <div class="flex items-center bg-black/40 border border-white/10 rounded-2xl px-6 py-3 shadow-inner w-full justify-between">
                        <span class="text-white/40 text-xs uppercase font-bold tracking-widest">Aktif Anahtar</span>
                        <span id="key-display" class="text-2xl font-bold text-cyan-400 font-mono drop-shadow-[0_0_8px_rgba(34,211,238,0.6)]">A=A</span>
                    </div>
                    <p id="drag-instruction" class="text-cyan-200/40 text-[10px] uppercase tracking-[0.2em] flex items-center gap-2 font-semibold">
                        <span class="hidden lg:inline">Ok Tuşları veya</span> Sürükleyerek Döndür
                    </p>
                </div>
            </div>

            <div class="w-full lg:w-1/2 space-y-6">
                <div class="flex flex-wrap items-end justify-between gap-4">
                    <div class="space-y-2 w-full sm:w-auto flex-1">
                        <label class="block text-[11px] text-cyan-400/60 uppercase font-bold tracking-[0.15em] ml-2">İşlem Modu</label>
                        <div class="flex bg-black/40 border border-white/10 rounded-2xl p-1.5 h-full">
                            <button id="mode-encrypt" class="flex-1 px-4 py-2.5 text-sm font-bold rounded-xl bg-cyan-500/20 text-cyan-300 shadow-lg border border-cyan-500/30 transition-all">ŞİFRELE</button>
                            <button id="mode-decrypt" class="flex-1 px-4 py-2.5 text-sm font-bold rounded-xl text-white/40 hover:text-white transition-all">ÇÖZ</button>
                        </div>
                    </div>

                    <div class="space-y-2 w-full sm:w-auto">
                        <label class="block text-[11px] text-cyan-400/60 uppercase font-bold tracking-[0.15em] ml-2 text-center sm:text-left">Manuel Döndürme</label>
                        <div class="flex items-center justify-center gap-3 bg-black/40 border border-white/10 p-2 rounded-2xl h-full">
                            <button id="btn-rotate-left" class="hover:bg-white/5 p-2 rounded-xl text-cyan-400 transition-colors" title="Sola Döndür (Geri)">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            </button>
                            <div class="h-4 w-[1px] bg-white/10"></div>
                            <button id="btn-rotate-right" class="hover:bg-white/5 p-2 rounded-xl text-cyan-400 transition-colors" title="Sağa Döndür (İleri)">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-[11px] text-cyan-400/60 uppercase font-bold tracking-[0.15em] ml-2">Metin Girişi</label>
                    <textarea id="input-text" rows="4" class="w-full glass-input rounded-2xl p-4 text-white transition-all placeholder-white/20 resize-none font-mono text-base lg:text-lg" placeholder="Şifrelenecek metni giriniz..."></textarea>
                </div>

                <div class="space-y-2 relative">
                    <label class="block text-[11px] text-purple-400/60 uppercase font-bold tracking-[0.15em] ml-2">Sonuç</label>
                    <div class="relative group">
                        <div id="output-text" class="w-full min-h-[120px] bg-black/60 border border-white/10 rounded-2xl p-4 pb-12 text-cyan-300 font-mono text-base lg:text-lg break-words shadow-inner overflow-y-auto max-h-[250px]"></div>
                        <div class="absolute right-3 bottom-3 flex items-center gap-3 bg-black/20 backdrop-blur-md p-1 rounded-xl border border-white/5">
                            <span id="copy-toast" class="text-cyan-400 text-[10px] font-bold uppercase tracking-widest opacity-0 transition-opacity">Kopyalandı!</span>
                            <button id="btn-copy" class="text-white/40 hover:text-cyan-300 hover:bg-white/10 p-2 rounded-lg transition-all">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="w-full max-w-6xl mx-auto py-12 flex flex-col items-center gap-8 z-10">
        <div class="w-3/4 sm:w-1/2 h-[1px] bg-gradient-to-r from-transparent via-cyan-500/40 to-transparent shadow-[0_0_10px_rgba(34,211,238,0.2)]"></div>
        
        <div class="flex flex-col items-center gap-4 group cursor-default">
            <div class="p-4 rounded-2xl bg-white/[0.02] border border-white/5 backdrop-blur-sm group-hover:border-cyan-500/30 group-hover:bg-white/[0.05] transition-all duration-700">
                <img src="POETA.png" alt="Po.E.T.A Logo" class="h-16 sm:h-20 w-auto object-contain logo-glow invert opacity-80 group-hover:opacity-100 transition-all duration-700" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                
                <div class="hidden flex-col items-center gap-1">
                    <span class="text-2xl font-bold tracking-[0.2em] text-cyan-400 font-mono">Po.E.T.A</span>
                    <span class="text-[8px] text-white/30 uppercase tracking-[0.1em]">Potansiyel Endüstriyel Tasarım Atölyesi</span>
                </div>
            </div>
            
            <div class="flex flex-col items-center gap-1">
                <span class="text-[10px] uppercase tracking-[0.5em] text-white/20 group-hover:text-cyan-400/50 transition-all duration-700">Potansiyel Endüstriyel Tasarım Atölyesi</span>
                <div class="w-0 group-hover:w-full h-[1px] bg-cyan-500/30 transition-all duration-700"></div>
            </div>
        </div>
    </footer>

    <script>
        const outerAlphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        const innerAlphabet = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
        const totalChars = outerAlphabet.length;
        
        let currentOffset = 0;
        let currentVisualAngle = 0;
        let isEncryptMode = true;

        const outerCircle = document.getElementById('outer-circle');
        const innerWrapper = document.getElementById('inner-circle-wrapper');
        const innerCircle = document.getElementById('inner-circle');
        const inputText = document.getElementById('input-text');
        const outputText = document.getElementById('output-text');
        const modeEncrypt = document.getElementById('mode-encrypt');
        const modeDecrypt = document.getElementById('mode-decrypt');
        const btnCopy = document.getElementById('btn-copy');
        const copyToast = document.getElementById('copy-toast');
        const keyDisplay = document.getElementById('key-display');
        const btnRotateLeft = document.getElementById('btn-rotate-left');
        const btnRotateRight = document.getElementById('btn-rotate-right');

        function drawLetters(container, alphabet, radiusPercent, isInner) {
            const chars = alphabet.split('');
            const angleStep = 360 / totalChars;

            chars.forEach((char, index) => {
                const letterWrap = document.createElement('div');
                letterWrap.className = 'letter-wrap';
                const angleDeg = index * angleStep;
                const angleRad = (angleDeg - 90) * (Math.PI / 180); 
                const x = Math.cos(angleRad) * radiusPercent;
                const y = Math.sin(angleRad) * radiusPercent;
                letterWrap.style.left = `calc(50% + ${x}%)`;
                letterWrap.style.top = `calc(50% + ${y}%)`;
                letterWrap.style.transform = `rotate(${angleDeg}deg)`;
                const letterSpan = document.createElement('span');
                letterSpan.innerText = char;
                letterSpan.className = `font-bold font-mono ${isInner ? 'text-[10px] lg:text-[12px]' : 'text-[12px] lg:text-[14px]'}`;
                letterWrap.appendChild(letterSpan);
                container.appendChild(letterWrap);
            });
        }

        drawLetters(outerCircle, outerAlphabet, 42, false);
        drawLetters(innerCircle, innerAlphabet, 36, true);

        function updateRotationWithAnimation() {
            innerCircle.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
            innerCircle.style.transform = `rotate(${currentVisualAngle}deg)`;
            updateOffsetAndProcessText();
        }

        function updateOffsetAndProcessText() {
            const angleStep = 360 / totalChars;
            const steps = Math.round(currentVisualAngle / angleStep);
            currentOffset = ((steps % totalChars) + totalChars) % totalChars;
            processText();
        }

        btnRotateRight.addEventListener('click', () => {
            currentVisualAngle += (360 / totalChars);
            updateRotationWithAnimation();
        });

        btnRotateLeft.addEventListener('click', () => {
            currentVisualAngle -= (360 / totalChars);
            updateRotationWithAnimation();
        });

        window.addEventListener('keydown', (e) => {
            if (document.activeElement === inputText) return;
            if (e.key === 'ArrowRight') {
                currentVisualAngle += (360 / totalChars);
                updateRotationWithAnimation();
            } else if (e.key === 'ArrowLeft') {
                currentVisualAngle -= (360 / totalChars);
                updateRotationWithAnimation();
            }
        });

        let isDragging = false;
        let lastTouchAngle = 0;
        let center = { x: 0, y: 0 };
        const angleStep = 360 / totalChars;

        function getCenter(el) {
            const rect = el.getBoundingClientRect();
            return { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        }

        function getAngle(e) {
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return Math.atan2(clientY - center.y, clientX - center.x) * (180 / Math.PI);
        }

        function onDragStart(e) {
            if (e.type === 'touchstart') e.preventDefault();
            isDragging = true;
            innerCircle.style.transition = 'none';
            center = getCenter(innerWrapper);
            lastTouchAngle = getAngle(e);
        }

        function onDragMove(e) {
            if (!isDragging) return;
            const currentTouchAngle = getAngle(e);
            let deltaAngle = currentTouchAngle - lastTouchAngle;
            if (deltaAngle > 180) deltaAngle -= 360;
            if (deltaAngle < -180) deltaAngle += 360;
            currentVisualAngle += deltaAngle;
            lastTouchAngle = currentTouchAngle;
            innerCircle.style.transform = `rotate(${currentVisualAngle}deg)`;
            updateOffsetAndProcessText();
        }

        function onDragEnd() {
            if (!isDragging) return;
            isDragging = false;
            const steps = Math.round(currentVisualAngle / angleStep);
            currentVisualAngle = steps * angleStep;
            updateRotationWithAnimation();
        }

        innerWrapper.addEventListener('mousedown', onDragStart);
        document.addEventListener('mousemove', onDragMove);
        document.addEventListener('mouseup', onDragEnd);
        innerWrapper.addEventListener('touchstart', onDragStart, { passive: false });
        document.addEventListener('touchmove', onDragMove, { passive: false });
        document.addEventListener('touchend', onDragEnd);

        function processText() {
            const text = inputText.value.toLocaleUpperCase('tr-TR');
            let result = '';
            const innerIndexForA = (0 - currentOffset + totalChars) % totalChars;
            keyDisplay.innerText = `A=${innerAlphabet[innerIndexForA]}`;

            for (let i = 0; i < text.length; i++) {
                const char = text[i];
                if (isEncryptMode) {
                    const outerIndex = outerAlphabet.indexOf(char);
                    if (outerIndex !== -1) {
                        const innerIndex = (outerIndex - currentOffset + totalChars) % totalChars;
                        result += innerAlphabet[innerIndex];
                    } else result += char;
                } else {
                    const innerIndex = innerAlphabet.indexOf(char);
                    if (innerIndex !== -1) {
                        const outerIndex = (innerIndex + currentOffset) % totalChars;
                        result += outerAlphabet[outerIndex];
                    } else result += char;
                }
            }
            
            if (result === '') {
                outputText.innerHTML = '<span class="text-white/10 italic">Sonuç burada görünecek...</span>';
            } else {
                outputText.innerText = result;
            }
        }

        inputText.addEventListener('input', processText);

        modeEncrypt.addEventListener('click', () => {
            isEncryptMode = true;
            modeEncrypt.className = "flex-1 px-4 py-2.5 text-sm font-bold rounded-xl bg-cyan-500/20 text-cyan-300 shadow-lg border border-cyan-500/30 transition-all";
            modeDecrypt.className = "flex-1 px-4 py-2.5 text-sm font-bold rounded-xl text-white/40 hover:text-white transition-all";
            processText();
        });

        modeDecrypt.addEventListener('click', () => {
            isEncryptMode = false;
            modeDecrypt.className = "flex-1 px-4 py-2.5 text-sm font-bold rounded-xl bg-cyan-500/20 text-cyan-300 shadow-lg border border-cyan-500/30 transition-all";
            modeEncrypt.className = "flex-1 px-4 py-2.5 text-sm font-bold rounded-xl text-white/40 hover:text-white transition-all";
            processText();
        });

        btnCopy.addEventListener('click', () => {
            const content = outputText.innerText;
            if (content && content !== 'Sonuç burada görünecek...') {
                const textarea = document.createElement('textarea');
                textarea.value = content;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                copyToast.style.opacity = '1';
                setTimeout(() => copyToast.style.opacity = '0', 2000);
            }
        });

        processText();
    </script>
</body>
</html>
